<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 100 Days Of Code</title>
    <link rel="icon" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/63b0c67427.js" crossorigin="anonymous"></script>
</head>
<body>

    <canvas id="network"></canvas>

    <nav class="navbar">
        <h1 class="logo">
            <a href="index.html">#100DaysOfCode</a> 
        </h1>

        <ul class="menu">
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="resources.html">Resources</a></li>
        </ul>

        <div class="social-networks">
            <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://github.com/Miafg3" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github"></i></a>
            <a href="https://dev.to/miafg3" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-dev"></i></a>
        </div>
    </nav>

    <main class="contact-page">
        <div class="contact-glow"></div>
        <section class="contact-card">

            <div class="contact-info">
                <span class="contact-tag">GET IN TOUCH</span>
                <h1>Let's Build Something Together</h1>
                <p>
                    If you have any questions, suggestions, 
                    or simply want to say hello, 
                    feel free to send me a message.
                </p>
            </div>

            <form action="https://formsubmit.co/miafg3@yopmail.com" method="POST" class="contact-form">
                <input type="hidden" name="_subject" value="Nuevo mensaje">
                <input type="hidden" name="_captcha" value="false">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="text" name="subject" placeholder="Subject">
                <textarea name="message" placeholder="Write your message..." required></textarea>
                <button type="submit">Send Message</button>
            </form>

        </section>
    </main>

    <script src="js/script.js"></script>

</body>
</html>
