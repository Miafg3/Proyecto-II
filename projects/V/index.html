<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="fondo-animado">
        <div class="niebla n1"></div>
        <div class="niebla n2"></div>
    </div>

    <main class="contenedor-app">
        <h1 class="titulo-app">Generador de Contraseñas</h1>

        <div class="formulario">
            <div class="grupo-control">
                <label for="letras">¿Cuántas letras deseas?</label>
                <input type="number" id="letras" min="0" max="30" value="8">
            </div>

            <div class="grupo-control">
                <label for="simbolos">¿Cuántos símbolos deseas?</label>
                <input type="number" id="simbolos" min="0" max="20" value="2">
            </div>

            <div class="grupo-control">
                <label for="numeros">¿Cuántos números deseas?</label>
                <input type="number" id="numeros" min="0" max="20" value="2">
            </div>

            <button class="btn-generar" onclick="generarContrasena()">Generar Contraseña ⚡</button>
        </div>

        <div class="contenedor-resultado">
            <div id="pantalla-password" class="texto-password">...</div>
            <button class="btn-copiar" id="btn-copiar" onclick="copiarAlPortapapeles()" disabled>Copiar</button>
        </div>

        <a href="../../index.html" class="back-btn">← Volver al Dashboard</a>
    </main>

    <script src="script.js"></script>
</body>
</html>
