<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día 2. Calculadora de propinas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="../../assets/favicon.png">
</head>
<body>
    <div class="container">
        <h1>Calculadora de propinas</h1>
        
        <div class="input-group">
            <label>TOTAL DE LA FACTURA ($)</label>
            <input type="number" id="bill" step="0.01" placeholder="0.00">
        </div>
        
        <div class="input-group">
            <label>PORCENTAJE DE PROPINA</label>
            <select id="tip">
                <option value="10">10%</option>
                <option value="12" selected>12%</option>
                <option value="15">15%</option>
            </select>
        </div>

        <div class="input-group">
            <label>¿CUÁNTAS PERSONAS DIVIDEN?</label>
            <input type="number" id="people" value="1" min="1">
        </div>
        
        <button onclick="calculateTip()">Calcular Total</button>
        
        <div id="result" class="result">
            <span>Cada persona debe pagar:</span>
            <h2 id="total-per-person">$0.00</h2>
        </div>

        <a href="../../index.html" class="back-btn">← Volver al Dashboard</a>
    </div>

    <script>
        function calculateTip() {
            const bill = parseFloat(document.getElementById('bill').value);
            const tip = parseInt(document.getElementById('tip').value);
            const people = parseInt(document.getElementById('people').value);
            const resultDiv = document.getElementById('result');
            const totalH2 = document.getElementById('total-per-person');

            if (isNaN(bill) || bill <= 0 || isNaN(people) || people <= 0) {
                alert('Por favor, ingresa montos y números de personas válidos.');
                return;
            }

            const total = (bill * (tip / 100 + 1)) / people;
            totalH2.innerText = `$${total.toFixed(2)}`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
